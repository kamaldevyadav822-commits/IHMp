<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chats</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-layout">

<div class="sidebar">

<div class="sidebar-top">

<h2>Chats</h2>

<button id="logoutBtn" class="icon-btn">
⎋
</button>

</div>

<div class="profile-box">

<img src="https://i.pravatar.cc/100">

<div>
<h3 id="username">User</h3>
<p>Online</p>
</div>

</div>

<div class="search-box">
<input type="text" placeholder="Search chats...">
</div>

<div class="chat-list">

<div class="chat-item" onclick="openRoom('alex')">

<img src="https://i.pravatar.cc/101">

<div class="chat-info">
<h4>Alex</h4>
<p>Online</p>
</div>

<div class="online-dot"></div>

</div>

<div class="chat-item" onclick="openRoom('emma')">

<img src="https://i.pravatar.cc/102">

<div class="chat-info">
<h4>Emma</h4>
<p>Typing...</p>
</div>

<div class="online-dot"></div>

</div>

<div class="chat-item" onclick="openRoom('john')">

<img src="https://i.pravatar.cc/103">

<div class="chat-info">
<h4>John</h4>
<p>Last seen recently</p>
</div>

</div>

</div>

</div>

<div class="empty-chat-screen">

<h1>Select a Chat</h1>
<p>Your conversations appear here</p>

</div>

</div>

<script type="module" src="chat.js"></script>

</body>
</html>
