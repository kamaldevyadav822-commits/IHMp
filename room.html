<!-- =========================
ROOM PAGE
room.html
UPDATED MOBILE-FIRST
MESSAGE BAR
========================= -->

<div class="message-bar">

<!-- ATTACH BUTTON -->

<button
class="attach-btn"
id="attachBtn"
>
＋
</button>

<!-- AUTO GROW INPUT -->

<textarea
id="messageInput"
placeholder="Message..."
rows="1"
autocomplete="off"
></textarea>

<!-- SEND BUTTON -->

<button
id="sendBtn"
class="send-btn"
>
➤
</button>

</div>

<!-- =========================
OPTIONAL FILE PICKER
FOR FUTURE IMAGE/FILE SUPPORT
========================= -->

<input
type="file"
id="fileInput"
hidden
accept="image/*,video/*"
/>

<style>

/* =========================
MODERN MESSAGE BAR
INSTAGRAM / TELEGRAM STYLE
========================= */

.message-bar{
position:sticky;
bottom:0;
left:0;
width:100%;
padding:12px 14px;
display:flex;
align-items:flex-end;
gap:10px;
background:#111;
border-top:1px solid #262626;
z-index:100;
}

/* =========================
ATTACH BUTTON
========================= */

.attach-btn{
width:44px;
height:44px;
border:none;
border-radius:50%;
background:#1f1f1f;
color:white;
font-size:24px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
flex-shrink:0;
transition:0.2s;
}

.attach-btn:active{
transform:scale(0.92);
}

/* =========================
TEXTAREA
========================= */

.message-bar textarea{
flex:1;
min-height:44px;
max-height:130px;
resize:none;
border:none;
outline:none;
background:#1a1a1a;
color:white;
padding:12px 16px;
border-radius:24px;
font-size:15px;
line-height:1.4;
overflow-y:auto;
word-break:break-word;
}

/* SCROLLBAR */

.message-bar textarea::-webkit-scrollbar{
width:4px;
}

.message-bar textarea::-webkit-scrollbar-thumb{
background:#333;
border-radius:20px;
}

/* =========================
SEND BUTTON
========================= */

.send-btn{
width:44px;
height:44px;
border:none;
border-radius:50%;
background:#0095f6;
color:white;
font-size:18px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
flex-shrink:0;
transition:0.2s;
}

.send-btn:active{
transform:scale(0.92);
}

/* =========================
MOBILE SAFE AREA
========================= */

@supports (padding: max(0px)) {

.message-bar{
padding-bottom:
max(
12px,
env(safe-area-inset-bottom)
);
}

}

/* =========================
MOBILE OPTIMIZATION
========================= */

@media(max-width:768px){

.message-bar{
padding:10px 12px;
}

.message-bar textarea{
font-size:16px;
}

}

</style>

<script>

/* =========================
AUTO GROW TEXTAREA
========================= */

const textarea =
document.getElementById(
'messageInput'
);

textarea.addEventListener(
'input',
()=>{

textarea.style.height =
'auto';

textarea.style.height =
textarea.scrollHeight + 'px';

}
);

/* =========================
ATTACH BUTTON
========================= */

const attachBtn =
document.getElementById(
'attachBtn'
);

const fileInput =
document.getElementById(
'fileInput'
);

attachBtn.addEventListener(
'click',
()=>{

fileInput.click();

}
);

/* =========================
OPTIONAL PREVIEW LOGIC
FOR FUTURE MEDIA MESSAGES
========================= */

fileInput.addEventListener(
'change',
(e)=>{

const file =
e.target.files[0];

if(!file) return;

console.log(
'Selected File:',
file.name
);

/*
Future:
Upload to Firebase Storage
*/

}
);

</script>
